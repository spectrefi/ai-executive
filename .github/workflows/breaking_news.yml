name: Breaking News Alerts

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:

jobs:
  breaking:
    runs-on: ubuntu-latest
    steps:
      - name: Check for high-impact launch or benchmark news
        run: |
          curl -f -X POST "${{ secrets.SITE_URL }}/api/breaking/news" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120

      - name: Check for significant rank jumps
        run: |
          curl -f -X POST "${{ secrets.SITE_URL }}/api/breaking/rank-jump" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60
