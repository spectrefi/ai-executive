name: Daily Social Post + Email Digest

on:
  schedule:
    - cron: "59 16 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Generate and publish daily social post
        run: |
          curl -f -X POST "${{ secrets.SITE_URL }}/api/generate-post" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 3660

      - name: Send daily email digest
        run: |
          curl -f -X POST "${{ secrets.SITE_URL }}/api/send-digest" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60
